<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${termo != null ? 'BahVago - ' + termo : 'BahVago - Resultados'}">BahVago - Resultados</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>

<body>

    <!-- NAVBAR -->
    <header class="navbar">
        <div class="container nav-container">
            <div class="logo" style="cursor: pointer;" onclick="window.location.href='/'">
                <span class="logo-icon">B</span>
                <span class="logo-text">BahVago</span>
            </div>
            <!-- Gerenciado dinamicamente via JS (Entrar/Cadastrar ou Ícones Logado) -->
            <nav class="nav-actions" id="navActionsSearch">
                <a th:href="@{/login}" href="/login" class="btn-text">Entrar</a>
                <a th:href="@{/cadastro}" href="/cadastro" class="btn-primary">Cadastrar</a>
            </nav>
        </div>
    </header>

    <!-- BARRA DE BUSCA COMPACTA (TOPO) -->
    <section class="search-top-bar">
        <div class="container">
            <form class="search-compact-form" id="compactSearchForm" th:action="@{/hoteis/search}"
                action="/hoteis/search" method="get">
                <div class="search-compact-input">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" name="termo" placeholder="Para onde você vai?" th:value="${termo}" value="">
                </div>
                <button type="submit" class="btn-compact-search">Buscar</button>
            </form>
        </div>
    </section>

    <!-- CONTEÚDO PRINCIPAL (LAYOUT DUAS COLUNAS) -->
    <main class="container search-layout">

        <!-- LATERAL ESQUERDA: FILTROS -->
        <aside class="search-sidebar">
            <div class="sidebar-header">
                <h3><i class="fa-solid fa-sliders"></i> Filtros</h3>
                <button type="button" class="btn-clear-filters" id="clearFilters">Limpar</button>
            </div>

            <form id="filtersForm">
                <!-- Preço por noite -->
                <div class="filter-group">
                    <label class="filter-label">Preço por noite</label>
                    <div class="price-range-inputs">
                        <input type="range" min="0" max="5000" value="5000" class="range-slider" id="priceRange">
                        <div class="range-values">
                            <span>R$ 0</span>
                            <span id="priceRangeMax">R$ 5000+</span>
                        </div>
                    </div>
                </div>

                <!-- Avaliação -->
                <div class="filter-group">
                    <label class="filter-label">Avaliação mínima</label>
                    <div class="filter-options">
                        <label class="checkbox-container"><input type="checkbox" data-filter="rating" value="5">
                            <span class="stars-gold">
                                <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                                <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                                <i class="fa-solid fa-star"></i>
                            </span> <small>5.0</small></label>
                        <label class="checkbox-container"><input type="checkbox" data-filter="rating" value="4">
                            <span class="stars-gold">
                                <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                                <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                                <i class="fa-regular fa-star"></i>
                            </span> <small>4.0+</small></label>
                        <label class="checkbox-container"><input type="checkbox" data-filter="rating" value="3">
                            <span class="stars-gold">
                                <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                                <i class="fa-solid fa-star"></i><i class="fa-regular fa-star"></i>
                                <i class="fa-regular fa-star"></i>
                            </span> <small>3.0+</small></label>
                        <label class="checkbox-container"><input type="checkbox" data-filter="rating" value="2">
                            <span class="stars-gold">
                                <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                                <i class="fa-regular fa-star"></i><i class="fa-regular fa-star"></i>
                                <i class="fa-regular fa-star"></i>
                            </span> <small>2.0+</small></label>
                        <label class="checkbox-container"><input type="checkbox" data-filter="rating" value="1">
                            <span class="stars-gold">
                                <i class="fa-solid fa-star"></i><i class="fa-regular fa-star"></i>
                                <i class="fa-regular fa-star"></i><i class="fa-regular fa-star"></i>
                                <i class="fa-regular fa-star"></i>
                            </span> <small>1.0+</small></label>
                    </div>
                </div>

                <!-- Comodidades -->
                <div class="filter-group">
                    <label class="filter-label">Comodidades</label>
                    <div class="filter-options">
                        <label class="checkbox-container">
                            <input type="checkbox" data-filter="pet"> Pet-friendly
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-apply-filters">Aplicar filtros</button>
            </form>
        </aside>

        <!-- COLUNA DIREITA: RESULTADOS -->
        <section class="search-results-side">
            <div class="results-header">
                <div>
                    <h2>Hotéis disponíveis</h2>
                    <p class="results-count"
                        th:text="${hoteis != null ? hoteis.size() + (hoteis.size() == 1 ? ' opção encontrada' : ' opções encontradas') : '0 opções encontradas'}">
                        0 opções encontradas
                    </p>
                </div>
                <div class="results-sort">
                    <span>Ordenar por:</span>
                    <select class="select-sort" id="sortSelect">
                        <option value="relevancia">Mais relevantes</option>
                        <option value="preco_asc">Menor preço</option>
                        <option value="preco_desc">Maior preço</option>
                        <option value="avaliacao">Melhor avaliação</option>
                    </select>
                </div>
            </div>

            <!-- Grid de resultados do banco -->
            <div class="search-hotels-grid" id="hotelsGrid">

                <!-- Card dinâmico gerado para cada hotel -->
                <div class="hotel-card" th:each="hotel : ${hoteis}" th:if="${hoteis != null and !hoteis.isEmpty()}"
                    th:attr="data-price=${ofertasPorHotel != null and ofertasPorHotel[hotel.id] != null ? ofertasPorHotel[hotel.id].preco : 999999}, data-rating=${hotel.avaliacaoMedia != null ? hotel.avaliacaoMedia : 0}, data-pet=${hotel.aceitaPet}">
                    <a th:href="@{/hoteis/{id}(id=${hotel.id})}" href="#">
                        <div class="card-image-wrapper">
                            <img th:src="${hotel.imagemUrl != null and !#strings.isEmpty(hotel.imagemUrl) ? hotel.imagemUrl : 'https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=500&q=80'}"
                                src="https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=500&q=80"
                                th:alt="${hotel.nome}" alt="Hotel">
                            <button class="btn-heart"
                                th:if="${ofertasPorHotel != null and ofertasPorHotel[hotel.id] != null}"
                                th:attr="data-codigo-oferta=${ofertasPorHotel[hotel.id].id}"
                                onclick="event.preventDefault(); event.stopPropagation();">
                                <i class="fa-regular fa-heart"></i>
                            </button>
                        </div>
                        <div class="card-content">
                            <div class="card-title-row">
                                <h3 th:text="${hotel.nome}">Hotel</h3>
                                <span class="rating">
                                    <i class="fa-solid fa-star" style="color:#3b82f6"></i>
                                    <span
                                        th:text="${hotel.avaliacaoMedia != null ? #numbers.formatDecimal(hotel.avaliacaoMedia, 1, 'POINT', 1, 'COMMA') : '0,0'}">0,0</span>
                                </span>
                            </div>
                            <p class="location">
                                <i class="fa-solid fa-location-dot"></i>
                                <span
                                    th:text="${hotel.localizacao?.cidade != null ? hotel.localizacao.cidade : 'Cidade'}">Cidade</span>,
                                <span
                                    th:text="${hotel.localizacao?.estado != null ? hotel.localizacao.estado : 'UF'}">UF</span>
                            </p>
                            <p class="amenities">
                                <i th:if="${hotel.aceitaPet}" class="fa-solid fa-paw" title="Aceita Pets" style="color: #3b82f6;"></i>
                                <i th:unless="${hotel.aceitaPet}" class="fa-solid fa-ban" title="Não aceita Pets" style="color: #94a3b8;"></i>
                            </p>
                            <div class="card-footer">
                                <span class="reviews" th:id="'totalAvaliacoes-' + ${hotel.id}"
                                    th:with="total=${totalAvaliacoesPorHotel != null and totalAvaliacoesPorHotel[hotel.id] != null ? totalAvaliacoesPorHotel[hotel.id] : 0}"
                                    th:text="${total == 0 ? 'Sem avaliações' : (total == 1 ? '1 avaliação' : total + ' avaliações')}">Sem
                                    avaliações</span>

                                <div class="price-box">
                                    <small>a partir de</small>
                                    <span class="price">R$ <span th:text="${ofertasPorHotel != null and ofertasPorHotel[hotel.id] != null
                                                   ? #numbers.formatDecimal(ofertasPorHotel[hotel.id].preco, 1, 'POINT', 2, 'COMMA')
                                                   : '-'}">-</span><small>/noite</small></span>
                                </div>
                            </div>
                        </div>
                    </a>
                </div>

                <!-- Estado vazio: nenhum resultado -->
                <div class="empty-search-state" th:if="${hoteis == null or hoteis.isEmpty()}">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <h3>Nenhum hotel encontrado</h3>
                    <p
                        th:text="${termo != null ? 'Não encontramos hotéis para &quot;' + termo + '&quot;. Tente outro destino.' : 'Tente buscar por cidade, estado ou nome do hotel.'}">
                        Tente buscar por outro destino.
                    </p>
                    <a href="/" class="btn-primary">Voltar ao início</a>
                </div>

            </div>
        </section>
    </main>

    <script th:src="@{/js/script.js}" src="/js/script.js"></script>
</body>

</html>
