<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BahVago - Meus Favoritos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
</head>

<body>

    <header class="navbar">
        <div class="container nav-container">
            <div class="logo" style="cursor: pointer;" onclick="window.location.href='/'">
                <span class="logo-icon">B</span>
                <span class="logo-text">BahVago</span>
            </div>
            <nav class="nav-actions-logged">
                <a th:href="@{/favoritos}" href="/favoritos" class="nav-icon-link active" title="Favoritos"><i
                        class="fa-regular fa-heart"></i></a>
                <a th:href="@{/usuarios/perfil}" href="/usuarios/perfil" class="nav-icon-link" title="Minha Conta"><i
                        class="fa-regular fa-user"></i></a>
                <button id="btnLogoutTop" class="btn-logout-icon" title="Sair"><i
                        class="fa-solid fa-arrow-right-from-bracket"></i></button>
            </nav>
        </div>
    </header>

    <main class="container fav-page-wrapper">
        <div class="fav-header">
            <h1><i class="fa-regular fa-heart" style="color: var(--accent-blue); margin-right: 8px;"></i> Meus favoritos
            </h1>
            <p id="favCount"
                th:text="${ofertasSalvas != null ? ofertasSalvas.size() + (ofertasSalvas.size() == 1 ? ' oferta salva' : ' ofertas salvas') : '0 ofertas salvas'}">
                0 ofertas salvas</p>
        </div>

        <div class="hotels-grid" id="favGrid" th:if="${ofertasSalvas != null and !ofertasSalvas.isEmpty()}">
            <div class="hotel-card" th:each="oferta : ${ofertasSalvas}"
                th:attr="data-codigo-oferta=${oferta.codigoOferta}">
                <div class="card-image-wrapper">
                    <a th:href="@{/hoteis/{id}(id=${oferta.codigoHotel})}">
                        <img th:src="${oferta.imagemUrl != null and !#strings.isEmpty(oferta.imagemUrl) ? oferta.imagemUrl : 'https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=500&q=80'}"
                            src="https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=500&q=80"
                            th:alt="${oferta.nomeHotel}" alt="Hotel">
                    </a>
                    <button class="btn-heart fav-active" th:attr="data-codigo-oferta=${oferta.codigoOferta}">
                        <i class="fa-solid fa-heart"></i>
                    </button>
                </div>
                <a th:href="@{/hoteis/{id}(id=${oferta.codigoHotel})}">
                    <div class="card-content">
                        <div class="card-title-row">
                            <h3 th:text="${oferta.nomeHotel}">Hotel</h3>
                            <span class="rating" th:if="${oferta.avaliacaoMedia != null}">
                                <i class="fa-solid fa-star"></i>
                                <span th:text="${#numbers.formatDecimal(oferta.avaliacaoMedia, 1, 1)}">0.0</span>
                            </span>
                        </div>
                        <p class="location">
                            <i class="fa-solid fa-location-dot"></i>
                            <span th:text="${oferta.cidade}">Cidade</span>,
                            <span th:text="${oferta.estado}">UF</span>
                        </p>
                        <div class="card-footer">
                            <span class="reviews">Oferta salva</span>
                            <div class="price-box">
                                <small>preço da oferta</small>
                                <span class="price">R$ <span
                                        th:text="${#numbers.formatDecimal(oferta.preco, 1, 2)}">0</span></span>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <div class="empty-fav-message" id="emptyState"
            th:classappend="${ofertasSalvas == null or ofertasSalvas.isEmpty()} ? '' : 'hidden'">
            <i class="fa-regular fa-folder-open"></i>
            <h3>Você não possui nenhuma oferta salva</h3>
            <p>Volte para a tela inicial e explore as opções clicando no ícone de coração.</p>
            <button class="btn-primary" onclick="window.location.href='/'"
                style="border:none; margin-top:15px; cursor:pointer;">Explorar Hotéis</button>
        </div>
    </main>

    <script th:src="@{/js/script.js}" src="/js/script.js"></script>
</body>

</html>
