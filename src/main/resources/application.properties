# Configuração do Servidor
server.port=8080
server.servlet.context-path=/

# Configuração do Banco de Dados MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bahvagoBD?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuração JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl

# Thymeleaf
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Logging
logging.level.root=INFO
logging.level.com.bahvago=DEBUG

# Mensagens
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# API externa de ofertas de hotéis
api.hoteis.ofertas.url=http://localhost:8001/api/v1/hoteis/ofertas
api.hoteis.ofertas.cache-ttl-segundos=300
